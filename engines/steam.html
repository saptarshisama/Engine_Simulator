<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam Engine — Stationary</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #060a06;
            font-family: 'Courier New', monospace;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #info h1 {
            font-size: 1.1rem;
            color: #33ff00;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 8px #33ff00;
        }

        #info p {
            color: #1ea300;
            font-size: .85rem;
            margin: 4px 0 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.4rem;
            color: #33ff00;
        }

        #dyno-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 140px;
            background: rgba(0, 0, 0, .88);
            border: 1px solid #1ea300;
            padding: 8px;
            pointer-events: none;
        }

        #dyno-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
    <script
        type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head>

<body>
    <div id="info">
        <h1>&gt; STATIONARY STEAM ENGINE // SINGLE-CYLINDER</h1>
        <p>External Combustion | Steam Piston | Centrifugal Governor | Crosshead + Crank</p>
    </div>
    <div id="loading">&gt; BUILDING STEAM PRESSURE...</div>
    <div id="dyno-panel"><canvas id="dyno-canvas"></canvas></div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        class DynoGraph {
            constructor(id) { this.c = document.getElementById(id); this.ctx = this.c.getContext('2d'); this.w = this.c.width = this.c.offsetWidth; this.h = this.c.height = this.c.offsetHeight; this.hist = []; }
            update(rpm) { const t = Math.max(0, 320 - rpm * .1), hp = t * rpm / 5252; this.hist.push({ rpm, t, hp }); if (this.hist.length > 180) this.hist.shift(); this.draw(); }
            draw() {
                const { ctx, w, h, hist } = this; ctx.clearRect(0, 0, w, h); ctx.strokeStyle = '#0d2200'; ctx.lineWidth = 1;
                for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(0, h * i / 4); ctx.lineTo(w, h * i / 4); ctx.stroke(); }
                if (hist.length < 2) return;
                [['t', '#ffaa00', 500], ['hp', '#00aaff', 500]].forEach((def) => {
                    const k = def[0], c = def[1], mx = def[2];
                    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.beginPath();
                    hist.forEach((p, i) => { const x = (i / 180) * w, y = h - (p[k] / mx) * h; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
                });
                const c = hist[hist.length - 1];
                ctx.fillStyle = '#33ff00'; ctx.font = '12px monospace'; ctx.fillText(`RPM: ${Math.round(c.rpm)}`, 8, 18);
                ctx.fillStyle = '#ffaa00'; ctx.fillText(`Torque: ${Math.round(c.t)} ft-lbs`, 8, 34);
                ctx.fillStyle = '#00aaff'; ctx.fillText(`Power: ${Math.round(c.hp)} HP`, 8, 50);
            }
        }

        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x060a06);
        const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, .1, 300);
        camera.position.set(-4, 14, 38);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.target.set(2, 6, 0);

        /* Lighting */
        scene.add(new THREE.AmbientLight(0x333333, 1.5));
        const hemi = new THREE.HemisphereLight(0xfff5e0, 0x222222, 0.9); scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffffff, 3.0);
        sun.position.set(12, 22, 15); sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -35; sun.shadow.camera.right = 35;
        sun.shadow.camera.top = 35; sun.shadow.camera.bottom = -35;
        sun.shadow.camera.far = 100; scene.add(sun);
        const fill = new THREE.DirectionalLight(0x8899bb, .9);
        fill.position.set(-12, 8, -8); scene.add(fill);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x0f0e0a, roughness: .95, metalness: .05 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        /* Materials */
        const M = {
            green: new THREE.MeshStandardMaterial({ color: 0x2d5a2d, roughness: .65, metalness: .35 }),
            dkGrn: new THREE.MeshStandardMaterial({ color: 0x1c3d1c, roughness: .8, metalness: .25 }),
            red: new THREE.MeshStandardMaterial({ color: 0x992211, roughness: .45, metalness: .4 }),
            dkRed: new THREE.MeshStandardMaterial({ color: 0x661100, roughness: .6, metalness: .3 }),
            brass: new THREE.MeshStandardMaterial({ color: 0xcc9922, roughness: .25, metalness: .9 }),
            steel: new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: .35, metalness: .9 }),
            chrome: new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: .05, metalness: 1.0 }),
            iron: new THREE.MeshStandardMaterial({ color: 0x242424, roughness: .88, metalness: .45 }),
            dkIron: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: .92, metalness: .35 }),
        };
        function S(m) { m.castShadow = true; m.receiveShadow = true; return m; }

        /* ──────────────────────────────────────────────────────────
           LAYOUT (viewed from front, camera at z=+38):
           Bedplate at y=0, extends x=-12 to x=14
           Flywheel center: FW = (-9, 9, 0)   – large, on LEFT
           Flywheel rotates around Z (in X-Y plane)
           Crank pin at radius CRANK_R from FW, world = (FW.x - CRANK_R·sin(θ), FW.y + CRANK_R·cos(θ))

           Crosshead slides HORIZONTALLY at y = FW.y, on guide rails from x=-3 to x=10
           Crosshead x = FW.x + sqrt(ROD_L² - 0) → FW.x + ROD_L when crank is at 0°
           More precisely the crosshead x satisfies: (cx-crankPinX)²+(FW.y-crankPinY)² = ROD_L²

           Piston rod goes VERTICALLY from crosshead UP into the cylinder
           Cylinder at: x=CYL_X  y center=CYL_Y, piston moves between CYL_Y-CYL_H and CYL_Y+CYL_H
           ────────────────────────────────────────────────────────── */
        const FW = { x: -9, y: 9 };
        const CRANK_R = 4.2;
        const ROD_L = 9.5;

        /* ── Bedplate ── */
        const bed = S(new THREE.Mesh(new THREE.BoxGeometry(28, 2, 10), M.green));
        bed.position.set(1, 1, 0); scene.add(bed);
        // rail edges
        [-13, 15].forEach(x => {
            const rail = S(new THREE.Mesh(new THREE.BoxGeometry(2, 1, 9), M.dkGrn));
            rail.position.set(x, 2.5, 0); scene.add(rail);
        });
        // mounting bolts on bedplate
        for (let i = 0; i < 7; i++) [-4, 4].forEach(z => {
            const b = S(new THREE.Mesh(new THREE.CylinderGeometry(.22, .22, .45, 6), M.steel));
            b.position.set(-11 + i * 4, 2.05, z); scene.add(b);
        });

        /* ── Flywheel bearing stands (A-frame either side of flywheel) ── */
        [-2.5, 2.5].forEach(z => {
            const col = S(new THREE.Mesh(new THREE.CylinderGeometry(.55, .75, FW.y - 1, 10), M.green));
            col.position.set(FW.x, (FW.y - 1) / 2 + 1, z); scene.add(col);
            const bear = S(new THREE.Mesh(new THREE.CylinderGeometry(.95, .95, .6, 16), M.iron));
            bear.rotation.x = Math.PI / 2; bear.position.set(FW.x, FW.y, z); scene.add(bear);
        });
        // Crankshaft stub
        const crankStub = S(new THREE.Mesh(new THREE.CylinderGeometry(.6, .6, 6, 16), M.steel));
        crankStub.rotation.x = Math.PI / 2; crankStub.position.set(FW.x, FW.y, 0); scene.add(crankStub);

        /* ── FLYWHEEL GROUP (rotates around Z) ── */
        const flywheelGroup = new THREE.Group();
        flywheelGroup.position.set(FW.x, FW.y, 0);
        scene.add(flywheelGroup);

        // Outer steel rim
        const fwRim = S(new THREE.Mesh(new THREE.TorusGeometry(6.8, .6, 16, 72), M.steel));
        flywheelGroup.add(fwRim);
        if (fwRim.isMesh) { fwRim.rotation.x = Math.PI / 2; }

        // 8 Red spokes (these are FLAT in the flywheel plane)
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            // Spoke extends from hub (r=1.5) to rim (r=6.5), as a flat box in XY plane of flywheel
            const sp = S(new THREE.Mesh(new THREE.BoxGeometry(.5, 5.0, .65), M.red));
            sp.position.set(Math.sin(angle) * 3.3, Math.cos(angle) * 3.3, 0);
            sp.rotation.z = -angle;
            flywheelGroup.add(sp);
        }
        // Red disc fill (inner web behind spokes)
        const fwDisc = S(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, .55, 20), M.dkRed));
        flywheelGroup.add(fwDisc);
        // Hub (steel)
        const fwHub = S(new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, .9, 24), M.steel));
        flywheelGroup.add(fwHub);

        // Crank pin eccentric (at offset from center on the flywheel face)
        // In flywheel local coords: (0, -CRANK_R, forwardFace)
        // After rotation.z=θ: world = FW + (CRANK_R·sinθ, -CRANK_R·cosθ, ..)
        // Wait — let me be explicit. Flywheel rotation.z = θ.
        // Local point (px, py) → world (FW.x + px·cosθ - py·sinθ, FW.y + px·sinθ + py·cosθ)
        // I want pin to move UP when θ=0 (TDC=up). So in local coords: (0, CRANK_R)
        // That gives world (FW.x - CRANK_R·sinθ, FW.y + CRANK_R·cosθ) ✓
        const crankPin = S(new THREE.Mesh(new THREE.CylinderGeometry(.38, .38, .8, 14), M.chrome));
        crankPin.position.set(0, CRANK_R, .5);   // local; will orbit as group rotates
        flywheelGroup.add(crankPin);

        /* ── Crosshead guide rails (horizontal, at y=FW.y) ── */
        // Rails go from x=FW.x to x=12
        [-1.8, 1.8].forEach(z => {
            const rail = S(new THREE.Mesh(new THREE.BoxGeometry(22, .3, .45), M.steel));
            rail.position.set(1, FW.y, z); scene.add(rail);
        });
        // Rail end supports
        [[FW.x - 1, 0], [12, 0]].forEach(([x]) => {
            const sup = S(new THREE.Mesh(new THREE.BoxGeometry(1.2, FW.y - .5, 4), M.green));
            sup.position.set(x, FW.y / 2, 0); scene.add(sup);
        });

        /* ── Crosshead (slides horizontally on rails) ── */
        const crosshead = S(new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.2, 3.8), M.steel));
        crosshead.position.set(0, FW.y, 0); scene.add(crosshead);
        // Crosshead wrist pin (horizontal, goes through Z)
        const xhPin = S(new THREE.Mesh(new THREE.CylinderGeometry(.32, .32, 4.4, 12), M.chrome));
        xhPin.rotation.x = Math.PI / 2; xhPin.position.set(0, FW.y, 0); scene.add(xhPin);

        /* ── Connecting rod (crank pin → crosshead pin) – updated each frame ── */
        const conRod = S(new THREE.Mesh(new THREE.CapsuleGeometry(.28, ROD_L * .9, 6, 16), M.steel));
        conRod.position.set(0, FW.y, 0); scene.add(conRod);

        /* ── Piston rod (crosshead → piston, near-vertical) ── */
        // Piston rod connects crosshead to the piston inside cylinder
        const CYL_X = 10;
        const pistonRod = S(new THREE.Mesh(new THREE.CylinderGeometry(.22, .22, 1, 12), M.chrome));
        pistonRod.position.set(CYL_X, FW.y + 3, 0); scene.add(pistonRod);

        /* ── Cylinder support pedestal ── */
        const cylPed = S(new THREE.Mesh(new THREE.BoxGeometry(5.5, 1, 5.5), M.green));
        cylPed.position.set(CYL_X, 2.5, 0); scene.add(cylPed);
        const cylCol = S(new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 5, 12), M.green));
        cylCol.position.set(CYL_X, 5.5, 0); scene.add(cylCol);

        /* ── Steam Cylinder (vertical, black iron) ── */
        const CYL_Y = 13.5;  // center of cylinder
        const CYL_H = 4.0;   // half-height (piston travel ±CYL_H within cylinder)
        const CYL_R = 2.5;
        const cylBody = S(new THREE.Mesh(new THREE.CylinderGeometry(CYL_R, CYL_R, 9, 24), M.dkIron));
        cylBody.position.set(CYL_X, CYL_Y, 0); scene.add(cylBody);
        // Cylinder top head
        const cylTop = S(new THREE.Mesh(new THREE.CylinderGeometry(CYL_R + .3, CYL_R + .3, .7, 24), M.iron));
        cylTop.position.set(CYL_X, CYL_Y + 4.85, 0); scene.add(cylTop);
        // Stuffing box bottom (where piston rod enters)
        const gland = S(new THREE.Mesh(new THREE.CylinderGeometry(CYL_R + .4, CYL_R + .4, .8, 24), M.iron));
        gland.position.set(CYL_X, CYL_Y - 4.8, 0); scene.add(gland);
        // Cylinder bands
        for (let i = 0; i < 4; i++) {
            const b = S(new THREE.Mesh(new THREE.TorusGeometry(CYL_R + .15, .17, 8, 24), M.iron));
            b.rotation.x = Math.PI / 2; b.position.set(CYL_X, CYL_Y - 3 + i * 2, 0); scene.add(b);
        }
        // Valve chest (slab on the -X side of cylinder)
        const valveChest = S(new THREE.Mesh(new THREE.BoxGeometry(1.4, 5, 3.2), M.iron));
        valveChest.position.set(CYL_X - 3.9, CYL_Y, 0); scene.add(valveChest);
        // Steam port stubs (connect chest to cylinder)
        [-1.8, 1.8].forEach(y => {
            const port = S(new THREE.Mesh(new THREE.CylinderGeometry(.3, .3, 1.4, 8), M.brass));
            port.rotation.z = Math.PI / 2; port.position.set(CYL_X - 2.7, CYL_Y + y, 0); scene.add(port);
        });
        // Pressure gauge on chest
        const gauge = S(new THREE.Mesh(new THREE.CylinderGeometry(.6, .6, .3, 16), M.brass));
        gauge.rotation.x = Math.PI / 2; gauge.position.set(CYL_X - 5, CYL_Y + 2, 0); scene.add(gauge);
        const gFace = new THREE.Mesh(new THREE.CircleGeometry(.55, 16), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .3 }));
        gFace.rotation.y = -Math.PI / 2; gFace.position.set(CYL_X - 5.4, CYL_Y + 2, 0); scene.add(gFace);
        // Drain valve
        const drainValve = S(new THREE.Mesh(new THREE.SphereGeometry(.3, 12, 10), M.brass));
        scene.add(drainValve);
        drainValve.position.set(CYL_X + 3, CYL_Y - 5, 0);

        /* ── Piston (inside cylinder) ── */
        const piston = S(new THREE.Mesh(new THREE.CylinderGeometry(CYL_R - .18, CYL_R - .18, 1.0, 22), M.steel));
        piston.position.set(CYL_X, CYL_Y, 0); scene.add(piston);

        /* ── Top beam / arch (visual, goes from top of cylinder column to flywheel column) ──
           This is the overhead connecting structure visible in reference image */
        const beamPath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(FW.x, FW.y + 7, 0),
            new THREE.Vector3(-2, FW.y + 9.5, 0),
            new THREE.Vector3(CYL_X, FW.y + 7, 0),
        ]);
        scene.add(new THREE.Mesh(new THREE.TubeGeometry(beamPath, 20, .42, 8, false), M.steel));
        // Center vertical column supporting beam
        const beamCol = S(new THREE.Mesh(new THREE.CylinderGeometry(.48, .58, FW.y + 9, 10), M.green));
        beamCol.position.set(-2, (FW.y + 9) / 2, 0); scene.add(beamCol);
        // Beam pivot rod
        const pivotRod = S(new THREE.Mesh(new THREE.CylinderGeometry(.2, .2, 5.5, 8), M.chrome));
        pivotRod.rotation.x = Math.PI / 2; pivotRod.position.set(-2, FW.y + 9.5, 0); scene.add(pivotRod);

        /* ── Steam inlet pipe ── */
        const inletPath = new THREE.CatmullRomCurve3([new THREE.Vector3(CYL_X, CYL_Y + 5.5, 0), new THREE.Vector3(CYL_X + 2, CYL_Y + 7, 0), new THREE.Vector3(CYL_X + 2, CYL_Y + 9, 0)]);
        scene.add(new THREE.Mesh(new THREE.TubeGeometry(inletPath, 10, .28, 8, false), M.brass));

        /* ── Centrifugal Governor ── */
        const govGroup = new THREE.Group();
        govGroup.position.set(6, 5.5, -3.5); scene.add(govGroup);
        // vertical shaft
        govGroup.add(S(new THREE.Mesh(new THREE.CylinderGeometry(.18, .18, 7, 10), M.steel)));
        const gLower = S(new THREE.Mesh(new THREE.CylinderGeometry(.8, 1, .5, 16), M.green));
        gLower.position.set(0, -3.5, 0); govGroup.add(gLower);
        // bevel gear
        const bGear = S(new THREE.Mesh(new THREE.CylinderGeometry(.65, .85, .4, 16), M.brass));
        bGear.position.set(0, 2.3, 0); govGroup.add(bGear);
        // spinning arm group (rotates with RPM)
        const govArmGroup = new THREE.Group();
        govGroup.add(govArmGroup);
        const govArmMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: .4, metalness: .85 });
        [-1, 1].forEach(side => {
            const armGrp = new THREE.Group();
            const arm = S(new THREE.Mesh(new THREE.CapsuleGeometry(.11, 2.2, 4, 8), govArmMat));
            arm.rotation.z = side * 0.45; arm.position.set(side * .7, .5, 0); armGrp.add(arm);
            const ball = S(new THREE.Mesh(new THREE.SphereGeometry(.42, 16, 14), M.brass));
            ball.position.set(side * 1.5, -0.1, 0); armGrp.add(ball);
            const lower = S(new THREE.Mesh(new THREE.CapsuleGeometry(.09, 1.5, 4, 8), govArmMat));
            lower.rotation.z = -side * .4; lower.position.set(side * .65, -1.6, 0); armGrp.add(lower);
            govArmGroup.add(armGrp);
        });

        /* ── GUI ── */
        const params = { rpm: 90, opacity: .18, autoRotate: false, wireframe: false };
        const gui = new GUI({ title: 'Engine Controls' });
        gui.add(params, 'rpm', 0, 350, 1).name('RPM');
        gui.add(params, 'opacity', 0, 1).name('Glass Opacity').onChange(v => {/* no glass on this engine */ });
        gui.add(params, 'autoRotate').name('Auto Rotate');
        gui.add(params, 'wireframe').name('Wireframe').onChange(v => {
            scene.traverse(c => { if (c.isMesh && c.material) c.material.wireframe = v; });
        });

        const dyno = new DynoGraph('dyno-canvas');
        document.getElementById('loading').style.display = 'none';

        /* ── Animation ── */
        let crankAngle = 0, lastTime = 0, govAngle = 0;
        const _up = new THREE.Vector3(0, 1, 0);

        function animate(time) {
            requestAnimationFrame(animate);
            const dt = Math.min((time - lastTime) / 1000, .05); lastTime = time;
            crankAngle += (params.rpm * Math.PI * 2 / 60) * dt;

            /* ── Flywheel ── */
            flywheelGroup.rotation.z = crankAngle;

            /* Crank pin world pos:
               Local point (0, CRANK_R) rotated by angle θ around Z:
               world x = FW.x + 0·cos(θ) - CRANK_R·sin(θ) = FW.x - CRANK_R·sin(θ)
               world y = FW.y + 0·sin(θ) + CRANK_R·cos(θ) = FW.y + CRANK_R·cos(θ)        */
            const cpX = FW.x - CRANK_R * Math.sin(crankAngle);
            const cpY = FW.y + CRANK_R * Math.cos(crankAngle);

            /* ── Crosshead slides horizontally at y = FW.y ──
               Constraint: distance from crank pin to crosshead pin = ROD_L
               (cx - cpX)² + (FW.y - cpY)² = ROD_L²
               cx = cpX + sqrt(ROD_L² - (FW.y - cpY)²)   [crosshead is to the RIGHT of flywheel] */
            const dy = FW.y - cpY;
            const cx = cpX + Math.sqrt(Math.max(0, ROD_L * ROD_L - dy * dy));
            crosshead.position.x = cx;
            xhPin.position.x = cx;

            /* ── Con-rod spans from crank pin to crosshead ── */
            const cpVec = new THREE.Vector3(cpX, cpY, 0);
            const chVec = new THREE.Vector3(cx, FW.y, 0);
            const dir = new THREE.Vector3().subVectors(chVec, cpVec);
            const len = dir.length();
            conRod.position.copy(cpVec).add(dir.clone().multiplyScalar(.5));
            conRod.quaternion.setFromUnitVectors(_up, dir.clone().normalize());
            conRod.scale.set(1, len / (ROD_L * .9 + .56), 1);

            /* ── Piston rod goes from crosshead UP into cylinder ──
               Crosshead is at (cx, FW.y). Cylinder axis at x=CYL_X.
               The piston rod is nearly vertical (slight diagonal due to offset).
               For simplicity: piston Y = FW.y + distance from crosshead up to cylinder.
               We model it as: the crosshead connects to the piston pin via a long angled rod.
               Piston: slides vertically in cylinder. Its Y is driven by the crosshead X position.
               Standard offset crank: piston moves between CYL_Y±CYL_H as x changes. */
            // Use the crosshead X displacement from center to infer piston position:
            const xDisp = (cx - (FW.x + ROD_L)) / (CRANK_R); // ~ -1 to +1
            const pistonY = CYL_Y + CYL_H * 0.85 * xDisp;
            piston.position.y = pistonY;

            // Piston rod: spans from crosshead wrist pin to piston bottom
            const xhPos = new THREE.Vector3(cx, FW.y, 0);
            const pPos = new THREE.Vector3(CYL_X, pistonY - 1.0, 0);
            const prDir = new THREE.Vector3().subVectors(pPos, xhPos);
            pistonRod.position.copy(xhPos).add(prDir.clone().multiplyScalar(.5));
            pistonRod.quaternion.setFromUnitVectors(_up, prDir.clone().normalize());
            pistonRod.scale.y = prDir.length() * .28; // CylinderGeometry height=1

            /* ── Governor ── */
            govAngle += params.rpm * .008 * dt;
            govArmGroup.rotation.y = govAngle;
            const openA = Math.min(Math.PI * .42, params.rpm / 350 * Math.PI * .42);
            govArmGroup.children.forEach((ag, i) => { ag.rotation.x = (i === 0 ? 1 : -1) * openA; });

            if (params.autoRotate) controls.azimuthAngle += .002;
            controls.update();
            dyno.update(params.rpm);
            renderer.render(scene, camera);
        }
        animate(0);
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>
</body>

</html>
