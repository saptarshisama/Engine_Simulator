<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam Engine Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            color: #eee;
            font-family: 'Courier New', monospace;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 5px #000;
            z-index: 10;
        }

        #info h1 {
            font-size: 1.2rem;
            color: #33ff00;
            letter-spacing: 2px;
        }

        #info p {
            color: #1ea300;
            font-size: 0.9rem;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #33ff00;
        }

        #dyno-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 340px;
            height: 160px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #1ea300;
            padding: 10px;
            pointer-events: none;
        }

        #dyno-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
    <script
        type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
</head>

<body>
    <div id="info">
        <h1>&gt; RECIPROCATING STEAM ENGINE // DOUBLE-ACTING</h1>
        <p>External Combustion | Steam Expanding | Slide Valve | ~15% Efficiency</p>
    </div>
    <div id="loading">&gt; BUILDING STEAM PRESSURE...</div>
    <div id="dyno-panel"><canvas id="dyno-canvas"></canvas></div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        class DynoGraph {
            constructor(id) {
                this.canvas = document.getElementById(id);
                this.ctx = this.canvas.getContext('2d');
                this.w = this.canvas.width = this.canvas.offsetWidth;
                this.h = this.canvas.height = this.canvas.offsetHeight;
                this.hist = [];
            }
            update(rpm) {
                const torque = Math.max(0, 320 - rpm * 0.08);
                const hp = torque * rpm / 5252;
                this.hist.push({ rpm, torque, hp });
                if (this.hist.length > 180) this.hist.shift();
                this.draw();
            }
            draw() {
                const { ctx, w, h, hist } = this;
                ctx.clearRect(0, 0, w, h);
                ctx.strokeStyle = '#1a3300'; ctx.lineWidth = 1;
                for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(0, h * i / 4); ctx.lineTo(w, h * i / 4); ctx.stroke(); }
                if (hist.length < 2) return;
                const draw = (key, color, max) => {
                    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
                    hist.forEach((p, i) => {
                        const x = (i / 180) * w;
                        const y = h - (p[key] / max) * h;
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }); ctx.stroke();
                };
                draw('torque', '#ffaa00', 500); draw('hp', '#00aaff', 500);
                const cur = hist[hist.length - 1];
                ctx.fillStyle = '#33ff00'; ctx.font = '13px monospace';
                ctx.fillText(`RPM: ${Math.round(cur.rpm)}`, 8, 18);
                ctx.fillStyle = '#ffaa00'; ctx.fillText(`Torque: ${Math.round(cur.torque)} ft-lbs`, 8, 36);
                ctx.fillStyle = '#00aaff'; ctx.fillText(`Power: ${Math.round(cur.hp)} HP`, 8, 54);
            }
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 500);
        camera.position.set(0, 15, 45);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.target.set(0, 2, 0);

        scene.add(new THREE.AmbientLight(0x333333));
        const hemi = new THREE.HemisphereLight(0xffeedd, 0x111111, 0.7);
        scene.add(hemi);
        const dir = new THREE.DirectionalLight(0xffffff, 2.5);
        dir.position.set(20, 25, 10); scene.add(dir);
        const steamLight = new THREE.PointLight(0xffffff, 0, 20);
        steamLight.position.set(-10, 5, 0); scene.add(steamLight);
        const grid = new THREE.GridHelper(100, 80, 0x222200, 0x111100);
        grid.position.y = -8; scene.add(grid);

        const MAT = {
            iron: new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.85, metalness: 0.4 }),
            brass: new THREE.MeshStandardMaterial({ color: 0xbb8800, roughness: 0.3, metalness: 0.9 }),
            chrome: new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.05, metalness: 1.0 }),
            steel: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5, metalness: 0.85 }),
            red: new THREE.MeshStandardMaterial({ color: 0x990000, roughness: 0.7, metalness: 0.3 }),
            steam: new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.0 }),
        };

        // --- Boiler (large horizontal cylinder) ---
        const boilerGeo = new THREE.CylinderGeometry(4, 4, 20, 32);
        const boiler = new THREE.Mesh(boilerGeo, MAT.iron);
        boiler.rotation.z = Math.PI / 2; boiler.position.set(-12, 0, 0); scene.add(boiler);
        // Boiler end caps
        const capGeo = new THREE.CylinderGeometry(4, 4, 0.5, 32);
        const cap1 = new THREE.Mesh(capGeo, MAT.brass); cap1.rotation.z = Math.PI / 2; cap1.position.set(-22.2, 0, 0); scene.add(cap1);
        const cap2 = new THREE.Mesh(capGeo, MAT.brass); cap2.rotation.z = Math.PI / 2; cap2.position.set(-1.8, 0, 0); scene.add(cap2);
        // Boiler bands/rivets
        for (let i = 0; i < 5; i++) {
            const band = new THREE.Mesh(new THREE.TorusGeometry(4.1, 0.2, 8, 32), MAT.brass);
            band.rotation.x = Math.PI / 2; band.position.set(-18 + i * 3, 0, 0); scene.add(band);
        }
        // Chimney
        const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 8, 16), MAT.iron);
        chimney.position.set(-18, 8, 0); scene.add(chimney);
        // Steam dome
        const dome = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2), MAT.brass);
        dome.position.set(-12, 4.3, 0); scene.add(dome);
        // Safety valve
        const safetyValve = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.5, 8), MAT.brass);
        safetyValve.position.set(-10, 5.1, 0); scene.add(safetyValve);

        // Steam pipe from boiler to cylinder
        const pipePath = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-1.5, 3, 0),
            new THREE.Vector3(0, 5, 0),
            new THREE.Vector3(4, 5, 0),
            new THREE.Vector3(6, 3, 0),
        ]);
        const pipeTube = new THREE.Mesh(new THREE.TubeGeometry(pipePath, 20, 0.4, 8, false), MAT.brass);
        scene.add(pipeTube);

        // --- Steam Cylinder ---
        const CYL_X = 8;
        const cylBody = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 14, 32), MAT.iron);
        cylBody.rotation.z = Math.PI / 2; cylBody.position.set(CYL_X, 0, 0); scene.add(cylBody);
        // Cylinder end covers
        const cylCap1 = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.6, 32), MAT.brass);
        cylCap1.rotation.z = Math.PI / 2; cylCap1.position.set(CYL_X - 7.3, 0, 0); scene.add(cylCap1);
        const cylCap2 = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.6, 32), MAT.brass);
        cylCap2.rotation.z = Math.PI / 2; cylCap2.position.set(CYL_X + 7.3, 0, 0); scene.add(cylCap2);
        // Piston rod stuffing box gland
        const gland = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 3.4, 1, 16), MAT.brass);
        gland.rotation.z = Math.PI / 2; gland.position.set(CYL_X + 8, 0, 0); scene.add(gland);
        // Cylinder bands
        for (let i = 0; i < 3; i++) {
            const b = new THREE.Mesh(new THREE.TorusGeometry(3.1, 0.18, 8, 32), MAT.brass);
            b.rotation.x = Math.PI / 2; b.position.set(CYL_X - 4 + i * 4, 0, 0); scene.add(b);
        }
        // Piston
        const piston = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 1.2, 32), MAT.steel);
        piston.rotation.z = Math.PI / 2; piston.position.set(CYL_X, 0, 0); scene.add(piston);

        // Piston rod
        const PISTON_ROD_L = 18;
        const pistonRod = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, PISTON_ROD_L, 16), MAT.chrome);
        pistonRod.rotation.z = Math.PI / 2; scene.add(pistonRod);

        // Crosshead guide rails
        const rail1 = new THREE.Mesh(new THREE.BoxGeometry(14, 0.3, 0.3), MAT.steel);
        rail1.position.set(CYL_X + 10, 2.5, 0); scene.add(rail1);
        const rail2 = new THREE.Mesh(new THREE.BoxGeometry(14, 0.3, 0.3), MAT.steel);
        rail2.position.set(CYL_X + 10, -2.5, 0); scene.add(rail2);

        // Crosshead
        const crosshead = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4.5, 2), MAT.steel);
        crosshead.position.set(CYL_X + 8, 0, 0); scene.add(crosshead);

        // Connecting rod
        const conrod = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 8, 6, 12), MAT.steel);
        scene.add(conrod);

        // Crankshaft
        const CRANK_X = CYL_X + 20;
        const crankMain = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 6, 20), MAT.steel);
        crankMain.rotation.x = Math.PI / 2; crankMain.position.set(CRANK_X, 0, 0); scene.add(crankMain);
        const crankThrow = new THREE.Group();
        crankThrow.position.set(CRANK_X, 0, 0);
        const crankPin = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3.5, 16), MAT.chrome);
        crankPin.rotation.x = Math.PI / 2; crankPin.position.y = 4; crankThrow.add(crankPin);
        const cw1 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 4.5, 3), MAT.steel);
        cw1.position.y = 2; crankThrow.add(cw1);
        scene.add(crankThrow);

        // Flywheel
        const fw = new THREE.Mesh(new THREE.CylinderGeometry(6, 6, 1, 48), MAT.iron);
        fw.rotation.x = Math.PI / 2; fw.position.set(CRANK_X, 0, 3.5); scene.add(fw);
        // Flywheel spokes
        for (let i = 0; i < 6; i++) {
            const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.4, 11, 0.5), MAT.iron);
            spoke.rotation.z = (i / 6) * Math.PI * 2;
            spoke.position.set(CRANK_X, 0, 3.3); scene.add(spoke);
        }
        // Flywheel rim detail
        const fwRim = new THREE.Mesh(new THREE.TorusGeometry(5.5, 0.5, 8, 48), MAT.brass);
        fwRim.rotation.x = Math.PI / 2; fwRim.position.set(CRANK_X, 0, 3.5); scene.add(fwRim);

        // Frame/bedplate
        const bedplate = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 8), MAT.iron);
        bedplate.position.set(8, -5, 0); scene.add(bedplate);
        const col1 = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 1), MAT.iron);
        col1.position.set(-3, 0, 3); scene.add(col1);
        const col2 = col1.clone(); col2.position.set(-3, 0, -3); scene.add(col2);
        const col3 = col1.clone(); col3.position.set(CRANK_X, 0, 3); scene.add(col3);
        const col4 = col1.clone(); col4.position.set(CRANK_X, 0, -3); scene.add(col4);

        // Steam glow effect
        const steamGlow = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, 14, 32, 1, true), MAT.steam);
        steamGlow.rotation.z = Math.PI / 2; steamGlow.position.set(CYL_X, 0, 0); scene.add(steamGlow);

        const CRANK_R = 4;
        const params = { rpm: 60, autoRotate: false };
        const gui = new GUI({ title: 'Engine Controls' });
        gui.add(params, 'rpm', 0, 400, 1).name('RPM');
        gui.add(params, 'autoRotate').name('Auto Rotate');

        const dyno = new DynoGraph('dyno-canvas');
        document.getElementById('loading').style.opacity = 0;

        let crankAngle = 0, lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);
            const dt = Math.min((time - lastTime) / 1000, 0.05); lastTime = time;
            crankAngle += (params.rpm * Math.PI * 2 / 60) * dt;

            // Crank rotation
            crankThrow.rotation.z = crankAngle;
            fw.rotation.z = crankAngle;

            // Crank pin world position
            const pinX = CRANK_X + CRANK_R * Math.sin(crankAngle);
            const pinY = CRANK_R * Math.cos(crankAngle);

            // Piston position (slider-crank)
            const ROD_L = 10;
            const sin_a = (pinX - CRANK_X) / CRANK_R;
            const pistonX = CRANK_X - Math.sqrt(ROD_L * ROD_L - (pinY) * (pinY)) - CRANK_R * Math.cos(crankAngle);
            const pX = CYL_X + (CRANK_R * Math.cos(crankAngle));

            piston.position.x = pX;
            crosshead.position.x = pX + PISTON_ROD_L / 2 + 0.5;
            pistonRod.position.x = pX + PISTON_ROD_L / 2;

            // Connect rod
            const cx = (pX + PISTON_ROD_L + 1 + pinX) / 2;
            const cy = pinY / 2;
            const angle = Math.atan2(pinY, pinX - (pX + PISTON_ROD_L + 1));
            conrod.position.set(cx, cy, 0);
            conrod.rotation.z = angle + Math.PI / 2;

            // Steam glow (pressure on stroke)
            const pressure = Math.max(0, Math.sin(crankAngle));
            MAT.steam.opacity = 0.12 * pressure;
            steamLight.intensity = 2 * pressure;

            if (params.autoRotate) controls.azimuthAngle += 0.002;
            controls.update();
            dyno.update(params.rpm);
            renderer.render(scene, camera);
        }
        animate(0);
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
