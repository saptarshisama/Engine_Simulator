<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM P75 H16 — F1 1966</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #060608;
            font-family: 'Courier New', monospace;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #info h1 {
            font-size: 1.1rem;
            color: #33ff00;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 8px #33ff00;
        }

        #info p {
            color: #1ea300;
            font-size: .85rem;
            margin: 4px 0 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.4rem;
            color: #33ff00;
        }

        #dyno-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 140px;
            background: rgba(0, 0, 0, .88);
            border: 1px solid #1ea300;
            padding: 8px;
            pointer-events: none;
        }

        #dyno-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
    <script
        type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head>

<body>
    <div id="info">
        <h1>&gt; BRM P75 H-16 // DUAL FLAT-8 F1 ENGINE</h1>
        <p>16 Cylinders | 3.0L | ~400 HP | Formula 1 1966-1968 | Stacked Twin Flat-8 Units</p>
    </div>
    <div id="loading">&gt; INITIALIZING BRM H16...</div>
    <div id="dyno-panel"><canvas id="dyno-canvas"></canvas></div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        class DynoGraph {
            constructor(id) { this.c = document.getElementById(id); this.ctx = this.c.getContext('2d'); this.w = this.c.width = this.c.offsetWidth; this.h = this.c.height = this.c.offsetHeight; this.hist = []; }
            update(rpm) { const t = Math.max(0, 215 * (1 - Math.pow((rpm - 8500) / 8000, 2))), hp = t * rpm / 5252; this.hist.push({ rpm, t, hp }); if (this.hist.length > 180) this.hist.shift(); this.draw(); }
            draw() {
                const { ctx, w, h, hist } = this; ctx.clearRect(0, 0, w, h); ctx.strokeStyle = '#0d2200'; ctx.lineWidth = 1;
                for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(0, h * i / 4); ctx.lineTo(w, h * i / 4); ctx.stroke(); }
                if (hist.length < 2) return;
                [['t', '#ffaa00', 700], ['hp', '#00aaff', 700]].forEach(([k, c, mx]) => {
                    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.beginPath();
                    hist.forEach((p, i) => { const x = (i / 180) * w, y = h - (p[k] / mx) * h; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
                });
                const c = hist[hist.length - 1];
                ctx.fillStyle = '#33ff00'; ctx.font = '12px monospace'; ctx.fillText(`RPM: ${Math.round(c.rpm)}`, 8, 18);
                ctx.fillStyle = '#ffaa00'; ctx.fillText(`Torque: ${Math.round(c.t)} ft-lbs`, 8, 34);
                ctx.fillStyle = '#00aaff'; ctx.fillText(`Power: ${Math.round(c.hp)} HP`, 8, 50);
            }
        }

        /* ── Scene ── */
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x060608);
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, .1, 300);
        /* The BRM H16 reference shows from slight above-front angle — intakes face +Z direction.
           Camera is placed in front of (+Z side) looking toward origin */
        camera.position.set(0, 12, 48);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.target.set(0, 4, 0);

        /* ── Lighting (bright!) ── */
        scene.add(new THREE.AmbientLight(0x333333, 2.5));
        const hemi = new THREE.HemisphereLight(0xffffff, 0x222222, 1.0); scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffffff, 3.5);
        sun.position.set(10, 20, 25); sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -35; sun.shadow.camera.right = 35;
        sun.shadow.camera.top = 35; sun.shadow.camera.bottom = -35;
        sun.shadow.camera.far = 120; scene.add(sun);
        const fill = new THREE.DirectionalLight(0x8899cc, 1.2); fill.position.set(-15, 8, -10); scene.add(fill);
        const top = new THREE.DirectionalLight(0xffffd0, .9); top.position.set(0, 30, 0); scene.add(top);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ color: 0x0c0c0e, roughness: .95, metalness: .05 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = -12; floor.receiveShadow = true; scene.add(floor);

        /* ── Materials ── */
        const M = {
            block: new THREE.MeshStandardMaterial({ color: 0x3c3c3a, roughness: .6, metalness: .8 }),
            head: new THREE.MeshStandardMaterial({ color: 0x555550, roughness: .5, metalness: .8 }),
            dark: new THREE.MeshStandardMaterial({ color: 0x1a1a18, roughness: .8, metalness: .5 }),
            trump: new THREE.MeshStandardMaterial({ color: 0x101010, roughness: .7, metalness: .6 }),
            chrome: new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: .06, metalness: 1.0 }),
            steel: new THREE.MeshStandardMaterial({ color: 0x999999, roughness: .35, metalness: .9 }),
            teal: new THREE.MeshStandardMaterial({ color: 0x2a6649, roughness: .55, metalness: .5 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xbb8811, roughness: .25, metalness: .92 }),
            wire: new THREE.MeshStandardMaterial({ color: 0xcc8800, roughness: .8, metalness: .0 }),
            exhaust: new THREE.MeshStandardMaterial({ color: 0x4a4a3a, roughness: .65, metalness: .7 }),
            glass: new THREE.MeshPhysicalMaterial({ color: 0xaaccee, transmission: .8, opacity: .2, transparent: true, roughness: .02, metalness: 0, side: THREE.DoubleSide }),
            flash: new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0, blending: THREE.AdditiveBlending }),
            badge: new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: .3, metalness: .7 }),
            intcool: new THREE.MeshStandardMaterial({ color: 0xaa8833, roughness: .4, metalness: .85 }),
        };
        function S(m) { m.castShadow = true; m.receiveShadow = true; return m; }

        /* ═══════════════════════════════════════════════════════════
           BRM H16 LAYOUT
           Two flat-8 (boxer-8) engines stacked vertically:
             Top unit y_center = +UNIT_HALF    crankshaft #1
             Bot unit y_center = -UNIT_HALF    crankshaft #2 (180° offset)

           Each flat-8 has 4 cylinders on LEFT side (x < 0) and 4 on RIGHT side (x > 0)
           Cylinders are HORIZONTAL (piston moves along X axis)
           Cylinders arranged along Z axis (4 per side), spaced CYL_Z apart

           Intake trumpets open toward +Z (front face) — camera is at z=+48 looking toward z=0
           ═══════════════════════════════════════════════════════════ */
        const UNIT_HALF = 4.8;       // half-separation between two flat-8 crankshafts
        const CYL_X_OUT = 11.0;      // how far cylinder heads extend from center
        const CYL_Z_SPACE = 3.8;     // Z spacing between cylinders in a row
        const N_CYL_ROW = 4;          // 4 cylinders per side per unit
        const BORE_R = 1.05;
        const PISTON_TRAVEL = 2.8;   // ±PISTON_TRAVEL from center of cylinder
        const CRANK_R = 1.4;
        const ROD_L = 4.8;
        const FRONT_Z = (N_CYL_ROW - 1) / 2 * CYL_Z_SPACE + 3.0;   // z-coordinate of front face of engine

        /* ── MAIN BLOCK HOUSING (two horizontal slabs) ── */
        [UNIT_HALF, -UNIT_HALF].forEach(yBase => {
            // Main block slab
            const blk = S(new THREE.Mesh(new THREE.BoxGeometry(CYL_X_OUT * 2 + 1, 3.2, CYL_Z_SPACE * (N_CYL_ROW - 1) + 5.5), M.block));
            blk.position.set(0, yBase, 0); scene.add(blk);

            // Side head covers (one per side), slightly raised
            [-1, 1].forEach(side => {
                const hc = S(new THREE.Mesh(new THREE.BoxGeometry(4.2, 2.6, CYL_Z_SPACE * (N_CYL_ROW - 1) + 5), M.head));
                hc.position.set(side * (CYL_X_OUT - .8), yBase, 0); scene.add(hc);
                // Head bolts
                for (let i = 0; i < N_CYL_ROW + 1; i++) {
                    const zb = (i - (N_CYL_ROW) / 2) * CYL_Z_SPACE;
                    [yBase + 1.1, yBase - 1.1].forEach(by => {
                        const bolt = S(new THREE.Mesh(new THREE.CylinderGeometry(.15, .15, .38, 6), M.steel));
                        bolt.position.set(side * (CYL_X_OUT + 1.0), by, zb); scene.add(bolt);
                    });
                }
            });

            // Horizontal ribbing on top/bottom face
            for (let i = 0; i < N_CYL_ROW; i++) {
                const z = (i - (N_CYL_ROW - 1) / 2) * CYL_Z_SPACE;
                const rib = S(new THREE.Mesh(new THREE.BoxGeometry(CYL_X_OUT * 2, .35, .3), M.dark));
                rib.position.set(0, yBase + (yBase > 0 ? 1.45 : -1.45), z); scene.add(rib);
            }

            /* ── Crankshaft for this unit ── */
            const cs = S(new THREE.Mesh(new THREE.CylinderGeometry(.55, .55, CYL_Z_SPACE * (N_CYL_ROW - 1) + 4, 16), M.steel));
            cs.rotation.x = Math.PI / 2; cs.position.set(0, yBase, 0); scene.add(cs);
        });

        /* ── Structural spine between the two units ── */
        // Flat vertical plates connecting left and right ends
        [-FRONT_Z + .5, FRONT_Z - .5].forEach(z => {
            const sp = S(new THREE.Mesh(new THREE.BoxGeometry(CYL_X_OUT * 2, UNIT_HALF * 2, .8), M.dark));
            sp.position.set(0, 0, z); scene.add(sp);
        });

        /* ── Coupling gears between the two crankshafts ── */
        const coup = S(new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, UNIT_HALF * 2 - 2, 16), M.dark));
        coup.position.set(0, 0, 0); scene.add(coup);
        [UNIT_HALF - .8, -UNIT_HALF + .8].forEach(y => {
            const g = S(new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, .4, 20), M.gold));
            g.position.set(0, y, 0); scene.add(g);
        });

        /* ═══════════════════════════════════════════════════
           FRONT FACE (+Z direction) — 16 INTAKE TRUMPETS
           Arranged as: 2 rows (top unit + bottom unit) × 8 per row
              Each row: 4 LEFT side + 4 RIGHT side
           The intakes are HORIZONTAL cylinders pointing toward the camera (+Z)
           ═══════════════════════════════════════════════════ */
        [UNIT_HALF, -UNIT_HALF].forEach(yBase => {
            [-1, 1].forEach(side => {
                for (let i = 0; i < N_CYL_ROW; i++) {
                    const zPos = (i - (N_CYL_ROW - 1) / 2) * CYL_Z_SPACE;
                    const xPos = side * (CYL_X_OUT * .5 + i * .6);  // stagger X slightly for the intakes

                    /* Velocity stack intake (trumpet shape facing +Z = camera direction) */
                    // Outer bell (flared end, facing camera)
                    const bell = S(new THREE.Mesh(new THREE.CylinderGeometry(BORE_R * .92, BORE_R * .6, 1.5, 16), M.trump));
                    bell.rotation.x = Math.PI / 2;
                    bell.position.set(xPos, yBase, FRONT_Z + .75);
                    scene.add(bell);
                    // Black hole interior (CircleGeometry at mouth)
                    const hole = new THREE.Mesh(new THREE.CircleGeometry(BORE_R * .88, 16), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                    hole.rotation.x = Math.PI / 2;
                    hole.position.set(xPos, yBase, FRONT_Z + 1.53);
                    scene.add(hole);
                    // Intake runner (straight tube going inward from bell)
                    const runner = S(new THREE.Mesh(new THREE.CylinderGeometry(BORE_R * .58, BORE_R * .58, 4.5, 14, 1, true), M.trump));
                    runner.rotation.x = Math.PI / 2;
                    runner.position.set(xPos, yBase, FRONT_Z - 1.75);
                    scene.add(runner);
                }
            });
        });

        /* ── Front face wall BEHIND the trumpets ── */
        // The front face plate is behind (lower Z) the intake openings
        const frontPlate = S(new THREE.Mesh(new THREE.BoxGeometry(CYL_X_OUT * 2 + 2, UNIT_HALF * 2 + 3.5, .9), M.dark));
        frontPlate.position.set(0, 0, FRONT_Z - 4.5);   // behind the intakes!
        scene.add(frontPlate);

        /* ── PISTONS (horizontal, animate along X, one per cylinder) ── */
        const allPistons = [];
        const _up = new THREE.Vector3(0, 1, 0);

        [UNIT_HALF, -UNIT_HALF].forEach((yBase, ui) => {
            const phaseOffset = ui * Math.PI;
            [-1, 1].forEach((side, si) => {
                for (let i = 0; i < N_CYL_ROW; i++) {
                    const zPos = (i - (N_CYL_ROW - 1) / 2) * CYL_Z_SPACE;
                    const pinAngle = (i * Math.PI / 2) + (si * Math.PI) + phaseOffset;

                    // Glass cylinder liner (horizontal)
                    const liner = new THREE.Mesh(new THREE.CylinderGeometry(BORE_R, BORE_R, PISTON_TRAVEL * 2 + 2, 18, 1, true), M.glass);
                    liner.rotation.z = Math.PI / 2;
                    liner.position.set(side * (CYL_X_OUT - 5), yBase, zPos);
                    scene.add(liner);

                    // Piston (horizontal)
                    const piston = S(new THREE.Mesh(new THREE.CylinderGeometry(BORE_R - .08, BORE_R - .08, .8, 18), M.chrome));
                    piston.rotation.z = Math.PI / 2;
                    piston.position.set(side * (CYL_X_OUT - 5), yBase, zPos);
                    scene.add(piston);

                    // Connecting rod
                    const conRod = S(new THREE.Mesh(new THREE.CapsuleGeometry(.22, ROD_L * .9, 4, 12), M.steel));
                    conRod.position.set(0, yBase, zPos);
                    scene.add(conRod);

                    // Combustion flash
                    const flash = new THREE.Mesh(new THREE.CylinderGeometry(BORE_R - .12, BORE_R - .12, .5, 12), M.flash.clone());
                    flash.rotation.z = Math.PI / 2;
                    flash.position.set(side * (CYL_X_OUT - 1.5), yBase, zPos);
                    scene.add(flash);

                    const fLight = new THREE.PointLight(0xff5500, 0, 6);
                    fLight.position.copy(flash.position); scene.add(fLight);

                    // Exhaust stub (goes OUTWARD and slightly back/up)
                    const exhPath = new THREE.CatmullRomCurve3([
                        new THREE.Vector3(side * (CYL_X_OUT + .5), yBase, zPos),
                        new THREE.Vector3(side * (CYL_X_OUT + 2.2), yBase - .8, zPos - .5),
                        new THREE.Vector3(side * (CYL_X_OUT + 2.5), yBase - 2, zPos - 1.5),
                    ]);
                    scene.add(new THREE.Mesh(new THREE.TubeGeometry(exhPath, 8, .32, 8, false), M.exhaust));

                    allPistons.push({ piston, conRod, flash, fLight, zPos, yBase, side, pinAngle, phaseOffset, ui });
                }
            });
        });

        /* ── TOP: Oil tank (teal, cylindrical) ── */
        const oilTank = S(new THREE.Mesh(new THREE.CylinderGeometry(1.9, 1.9, 9, 22), M.teal));
        oilTank.rotation.x = Math.PI / 2; oilTank.position.set(5.5, UNIT_HALF + 3.5, -1); scene.add(oilTank);
        const oilCap = S(new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.1, .5, 22), M.steel));
        oilCap.rotation.x = Math.PI / 2; oilCap.position.set(5.5, UNIT_HALF + 3.5, 3.6); scene.add(oilCap);

        /* ── TOP: Intercooler / heat exchanger (gold, rectangular) ── */
        const icBlock = S(new THREE.Mesh(new THREE.BoxGeometry(10, 2.2, 6), M.intcool));
        icBlock.position.set(-3, UNIT_HALF + 4.0, 1.5); scene.add(icBlock);
        // Fins
        for (let i = 0; i < 10; i++) {
            const fin = new THREE.Mesh(new THREE.BoxGeometry(10, 2.1, .12), M.gold);
            fin.position.set(-3, UNIT_HALF + 4.0, -2.5 + i * .55); scene.add(fin);
        }
        // BRM badge plate
        const bplt = S(new THREE.Mesh(new THREE.BoxGeometry(4.5, .6, 1.8), M.badge));
        bplt.position.set(-3, UNIT_HALF + 5.2, 1.5); scene.add(bplt);
        // Fill pipe on top
        const fillPipe = S(new THREE.Mesh(new THREE.CylinderGeometry(.4, .4, 1.5, 10), M.steel));
        fillPipe.position.set(-3, UNIT_HALF + 5.8, 3.5); scene.add(fillPipe);
        const fillCap = S(new THREE.Mesh(new THREE.CylinderGeometry(.55, .55, .3, 10), M.chrome));
        fillCap.position.set(-3, UNIT_HALF + 6.6, 3.5); scene.add(fillCap);

        /* TOP: upper pipes from oil tank */
        const oilPipePath = new THREE.CatmullRomCurve3([new THREE.Vector3(5.5, UNIT_HALF + 3.5, 4), new THREE.Vector3(3, UNIT_HALF + 6, 3), new THREE.Vector3(0, UNIT_HALF + 6.5, 2)]);
        scene.add(new THREE.Mesh(new THREE.TubeGeometry(oilPipePath, 10, .28, 8, false), M.teal));

        /* ── Rear gearbox ── */
        const gbk = S(new THREE.Mesh(new THREE.BoxGeometry(13, 10, 5.5), M.dark));
        gbk.position.set(0, 0, -FRONT_Z - 2); scene.add(gbk);
        const gbCyl = S(new THREE.Mesh(new THREE.CylinderGeometry(4, 4.5, 5.6, 20), M.block));
        gbCyl.rotation.x = Math.PI / 2; gbCyl.position.set(0, 0, -FRONT_Z - 2); scene.add(gbCyl);
        const outShaft = S(new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.1, 3.5, 14), M.chrome));
        outShaft.rotation.x = Math.PI / 2; outShaft.position.set(0, 0, -FRONT_Z - 6); scene.add(outShaft);

        /* ── Gold wiring harnesses ── */
        [[new THREE.Vector3(-8, UNIT_HALF + 4, 4), new THREE.Vector3(-5, 3, 8), new THREE.Vector3(-3, -4, 5)],
        [new THREE.Vector3(8, UNIT_HALF + 4, 2), new THREE.Vector3(6, 2, 8), new THREE.Vector3(4, -4, 5)],
        [new THREE.Vector3(-6, -UNIT_HALF + 1, 4), new THREE.Vector3(-4, -UNIT_HALF - 2, 8), new THREE.Vector3(-2, -8, 5)]].forEach(pts => {
            const p = new THREE.CatmullRomCurve3(pts);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(p, 10, .09, 5, false), M.wire));
        });

        /* ── POST-PROCESSING ── */
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.0, .4, .85);
        bloom.strength = .4; composer.addPass(bloom);

        /* ── GUI ── */
        const params = { rpm: 90, opacity: .2, autoRotate: false, wireframe: false };
        const gui = new GUI({ title: 'Engine Controls' });
        gui.add(params, 'rpm', 0, 11000, 50).name('RPM');
        gui.add(params, 'opacity', 0, 1).name('Glass Opacity').onChange(v => { M.glass.opacity = v; });
        gui.add(params, 'autoRotate').name('Auto Rotate');
        gui.add(params, 'wireframe').name('Wireframe').onChange(v => {
            scene.traverse(c => { if (c.isMesh && c.material) c.material.wireframe = v; });
        });

        const dyno = new DynoGraph('dyno-canvas');
        document.getElementById('loading').style.opacity = 0;

        /* ── Animation ── */
        let crankAngle = 0, lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);
            const dt = Math.min((time - lastTime) / 1000, .05); lastTime = time;
            crankAngle += (params.rpm * Math.PI * 2 / 60) * dt;

            allPistons.forEach(p => {
                /* The crankshaft for this unit is at (0, p.yBase, p.zPos) — no, the crankshaft
                   runs along Z. So the crank pin for cylinder at zPos orbits around the Z axis
                   at the cylinder's Z position.
                   Crankshaft rotates around Z axis → crank pin local (0, CRANK_R).
                   After rotation by crankAngle + p.pinAngle:
                     pin_x (in XY plane) = -CRANK_R·sin(θ)
                     pin_y               = +CRANK_R·cos(θ)  + yBase
                   Piston slides along X at y=yBase.
                   Slider-crank on X axis (piston at x=?, crank at x=0):
                     pistonX = CRANK_R·cos(θ) + √(ROD_L² - CRANK_R²·sin²(θ))
                   Then multiply by side (direction) */
                const theta = crankAngle + p.pinAngle;
                const sinT = Math.sin(theta), cosT = Math.cos(theta);
                /* crankPin world position (in XY plane at this Z) */
                const cpX = -CRANK_R * sinT;          // crank pin x offset from center
                const cpY = p.yBase + CRANK_R * cosT;   // crank pin y

                /* Slider-crank for HORIZONTAL piston (moves along X):
                   piston is on the 'side' side. We flip the formula so:
                   pistonLocalX = CRANK_R·cosT + √(ROD_L² - CRANK_R²·sin²T)
                   Final piston world X = side * (some_base + pistonLocalX) */
                const pistonLocalX = CRANK_R * cosT + Math.sqrt(Math.max(0, ROD_L * ROD_L - CRANK_R * CRANK_R * sinT * sinT));
                const pistonWorldX = p.side * pistonLocalX;

                p.piston.position.x = pistonWorldX;
                p.piston.position.y = p.yBase;

                /* Con-rod spans from crankpin (cpX, cpY, p.zPos) to piston wrist pin (pistonWorldX, p.yBase, p.zPos) */
                const pinVec = new THREE.Vector3(cpX, cpY, p.zPos);
                const wristVec = new THREE.Vector3(pistonWorldX, p.yBase, p.zPos);
                const dir = new THREE.Vector3().subVectors(wristVec, pinVec);
                const len = dir.length();
                p.conRod.position.copy(pinVec).add(dir.clone().multiplyScalar(.5));
                p.conRod.quaternion.setFromUnitVectors(_up, dir.clone().normalize());
                p.conRod.scale.set(1, len / (ROD_L * .9 + .44), 1);

                /* Combustion flash */
                let phase = ((theta) * 180 / Math.PI) % 720;
                if (phase < 0) phase += 720;
                const firing = phase < 45;
                p.flash.material.opacity = firing ? .82 * (1 - phase / 45) : 0;
                p.fLight.intensity = firing ? 4 * (1 - phase / 45) : 0;
            });

            if (params.autoRotate) controls.azimuthAngle += .003;
            controls.update();
            dyno.update(params.rpm);
            composer.render();
        }
        animate(0);
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight); });
    </script>
</body>
